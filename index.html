      .secondary-btn,
      .danger-btn,
      .success-btn,
      .ghost-btn {
        padding: 0 10px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body data-mobile-view="study">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>Flashcards</h1>
        <button class="icon-btn mobile-deck-toggle" id="closeDecksBtn" title="Close decks" aria-label="Close decks">x</button>
      </div>

      <form class="deck-form" id="deckForm">
        <input id="deckNameInput" type="text" placeholder="New deck name" autocomplete="off" required>
        <button class="icon-btn" title="Create deck" aria-label="Create deck">+</button>
      </form>

      <div class="search-box">
        <input id="deckSearch" type="search" placeholder="Search decks">
      </div>

      <div class="deck-list" id="deckList" aria-label="Deck list"></div>
      <section class="mobile-deck-details" id="mobileDeckDetails" aria-live="polite"></section>
      <div class="backup-actions" aria-label="Backup actions">
        <button class="secondary-btn" id="exportBackupBtn" type="button">Export Backup</button>
        <button class="secondary-btn" id="importBackupBtn" type="button">Import Backup</button>
        <input id="backupFileInput" type="file" accept="application/json,.json" hidden>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <button class="secondary-btn mobile-deck-toggle" id="openDecksBtn">Decks</button>
        <div class="title-block">
          <h2 id="activeDeckTitle">No deck selected</h2>
          <p id="activeDeckSubtitle">Create a deck to get started.</p>
        </div>
        <div class="actions">
          <button class="secondary-btn" id="renameDeckBtn">Rename</button>
          <button class="secondary-btn" id="studyStacksBtn">Study in Stacks</button>
          <button class="secondary-btn" id="toggleImportBtn">Import</button>
          <button class="secondary-btn" id="settingsBtn">Settings</button>
          <button class="danger-btn" id="deleteDeckBtn">Delete Deck</button>
        </div>
      </section>

      <section class="stats" aria-label="Study stats">
        <div class="stat"><strong id="totalCount">0</strong><span>Total cards</span></div>
        <div class="stat"><strong id="knownCount">0</strong><span>Known</span></div>
        <div class="stat"><strong id="missedCount">0</strong><span>Missed</span></div>
        <div class="stat"><strong id="remainingCount">0</strong><span>In session</span></div>
      </section>

      <section class="import-panel" id="importPanel">
        <div class="panel-header">
          <h3>Import Cards</h3>
          <button class="ghost-btn" id="clearImportBtn">Clear</button>
        </div>
        <div class="field">
          <label for="importText">Paste term[TAB]definition; continuation lines are included in the definition</label>
          <textarea id="importText" placeholder="Port scanning&#9;A technique used to identify open ports on a host."></textarea>
        </div>
        <div class="form-actions">
          <button class="primary-btn" id="importBtn">Import Cards</button>
        </div>
        <p class="hint">Blank lines are ignored. Lines without a tab are skipped.</p>
      </section>

      <section class="settings-panel" id="settingsPanel">
        <div class="panel-header">
          <h3>Settings</h3>
        </div>
        <div class="setting-row">
          <div>
            <strong>Dark Mode</strong>
            <span>Use a darker theme for studying.</span>
          </div>
          <label class="toggle" aria-label="Toggle dark mode">
            <input type="checkbox" id="darkModeToggle">
            <span class="toggle-track"></span>
          </label>
        </div>
      </section>

      <section class="stack-panel" id="stackPanel">
        <div class="panel-header">
          <h3>Study in Stacks</h3>
        </div>
        <div class="field">
          <label for="stackSizeSelect">Cards per stack</label>
          <select id="stackSizeSelect">
            <option value="10">10 cards per stack</option>
            <option value="20">20 cards per stack</option>
            <option value="25">25 cards per stack</option>
            <option value="50">50 cards per stack</option>
          </select>
        </div>
        <label class="switch"><input type="checkbox" id="stackShuffleToggle"> Shuffle before dividing</label>
        <div class="form-actions">
          <button class="primary-btn" id="startStacksBtn" type="button">Start Stack Session</button>
          <button class="secondary-btn" id="cancelStacksBtn" type="button">Cancel</button>
        </div>
      </section>

      <section class="study-layout">
        <div class="study-panel">
          <div class="toolbar">
            <div class="toggle-row">
              <label class="switch"><input type="checkbox" id="shuffleToggle"> Shuffle</label>
              <label class="switch"><input type="checkbox" id="missedToggle"> Review missed</label>
              <label class="switch"><input type="checkbox" id="reverseToggle"> Reverse Cards</label>
            </div>
            <button class="ghost-btn" id="resetProgressBtn">Reset Progress</button>
          </div>

          <div class="progress-line">
            <span id="cardPosition">0 / 0</span>
            <span id="studyModeLabel">All cards</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <div class="form-actions" id="stackControls" hidden>
            <button class="secondary-btn" id="previousStackBtn" type="button">Previous Stack</button>
            <button class="secondary-btn" id="nextStackBtn" type="button">Next Stack</button>
            <button class="secondary-btn" id="restartStacksBtn" type="button">Restart Stacks</button>
            <button class="secondary-btn" id="exitStacksBtn" type="button">Exit Stack Mode</button>
          </div>

          <div class="card-stage" id="cardStage"></div>

          <div class="nav-row">
            <button class="secondary-btn" id="prevBtn">Previous</button>
            <button class="secondary-btn" id="flipBtn">Flip</button>
            <button class="secondary-btn" id="nextBtn">Next</button>
          </div>
          <div class="grade-row" style="margin-top: 8px;">
            <button class="danger-btn" id="dontKnowBtn">Don't Know</button>
            <button class="success-btn" id="knowBtn">Know</button>
          </div>
        </div>

        <div class="editor-panel">
          <div class="panel-header">
            <h3 id="editorTitle">Add Card</h3>
            <button class="text-btn" id="cancelEditBtn" type="button">Cancel</button>
          </div>
          <form id="cardForm" class="field-grid">
            <div class="field">
              <label for="termInput">Term</label>
              <textarea id="termInput" required></textarea>
            </div>
            <div class="field">
              <label for="definitionInput">Definition</label>
              <textarea id="definitionInput" required></textarea>
            </div>
            <div class="form-actions">
              <button class="primary-btn" id="saveCardBtn">Add Card</button>
            </div>
          </form>
          <div class="cards-list" id="cardsList"></div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button type="button" data-mobile-nav="decks"><span>□</span><span>Decks</span></button>
    <button type="button" class="active" data-mobile-nav="study"><span>◫</span><span>Study</span></button>
    <button type="button" data-mobile-nav="add"><span>＋</span><span>Add</span></button>
    <button type="button" data-mobile-nav="import"><span>⇣</span><span>Import</span></button>
    <button type="button" data-mobile-nav="settings"><span>⚙</span><span>Settings</span></button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "quizletStyleFlashcards.v1";

    const sampleDeck = {
      id: crypto.randomUUID(),
      name: "Security Basics",
      cards: [
        {
          id: crypto.randomUUID(),
          term: "CIA triad",
          definition: "Confidentiality, integrity, and availability: three core goals of information security.",
          status: "unseen"
        },
        {
          id: crypto.randomUUID(),
          term: "Phishing",
          definition: "A social engineering attack that tricks people into revealing sensitive information or installing malware.",
          status: "unseen"
        },
        {
          id: crypto.randomUUID(),
          term: "Least privilege",
          definition: "Giving users and systems only the access they need to perform their work.",
          status: "unseen"
        }
      ]
    };

    const state = {
      decks: [],
      activeDeckId: null,
      activeCardId: null,
      editingCardId: null,
      isFlipped: false,
      shuffle: false,
      missedOnly: false,
      reverseCards: false,
      darkMode: false,
      sessionIds: [],
      stackSessions: {}
    };

    const els = {
      sidebar: document.getElementById("sidebar"),
      openDecksBtn: document.getElementById("openDecksBtn"),
      closeDecksBtn: document.getElementById("closeDecksBtn"),
      deckForm: document.getElementById("deckForm"),
      deckNameInput: document.getElementById("deckNameInput"),
      deckSearch: document.getElementById("deckSearch"),
      deckList: document.getElementById("deckList"),
      mobileDeckDetails: document.getElementById("mobileDeckDetails"),
      exportBackupBtn: document.getElementById("exportBackupBtn"),
      importBackupBtn: document.getElementById("importBackupBtn"),
      backupFileInput: document.getElementById("backupFileInput"),
      activeDeckTitle: document.getElementById("activeDeckTitle"),
      activeDeckSubtitle: document.getElementById("activeDeckSubtitle"),
      renameDeckBtn: document.getElementById("renameDeckBtn"),
      studyStacksBtn: document.getElementById("studyStacksBtn"),
      deleteDeckBtn: document.getElementById("deleteDeckBtn"),
      toggleImportBtn: document.getElementById("toggleImportBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      importPanel: document.getElementById("importPanel"),
      settingsPanel: document.getElementById("settingsPanel"),
      stackPanel: document.getElementById("stackPanel"),
      stackSizeSelect: document.getElementById("stackSizeSelect"),
      stackShuffleToggle: document.getElementById("stackShuffleToggle"),
      startStacksBtn: document.getElementById("startStacksBtn"),
      cancelStacksBtn: document.getElementById("cancelStacksBtn"),
      darkModeToggle: document.getElementById("darkModeToggle"),
      importText: document.getElementById("importText"),
      importBtn: document.getElementById("importBtn"),
      clearImportBtn: document.getElementById("clearImportBtn"),
      totalCount: document.getElementById("totalCount"),
      knownCount: document.getElementById("knownCount"),
      missedCount: document.getElementById("missedCount"),
      remainingCount: document.getElementById("remainingCount"),
      shuffleToggle: document.getElementById("shuffleToggle"),
      missedToggle: document.getElementById("missedToggle"),
      reverseToggle: document.getElementById("reverseToggle"),
      resetProgressBtn: document.getElementById("resetProgressBtn"),
      cardPosition: document.getElementById("cardPosition"),
      studyModeLabel: document.getElementById("studyModeLabel"),
      progressFill: document.getElementById("progressFill"),
      stackControls: document.getElementById("stackControls"),
      previousStackBtn: document.getElementById("previousStackBtn"),
      nextStackBtn: document.getElementById("nextStackBtn"),
      restartStacksBtn: document.getElementById("restartStacksBtn"),
      exitStacksBtn: document.getElementById("exitStacksBtn"),
      cardStage: document.getElementById("cardStage"),
      prevBtn: document.getElementById("prevBtn"),
      flipBtn: document.getElementById("flipBtn"),
      nextBtn: document.getElementById("nextBtn"),
      dontKnowBtn: document.getElementById("dontKnowBtn"),
      knowBtn: document.getElementById("knowBtn"),
      editorTitle: document.getElementById("editorTitle"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      cardForm: document.getElementById("cardForm"),
      termInput: document.getElementById("termInput"),
      definitionInput: document.getElementById("definitionInput"),
      saveCardBtn: document.getElementById("saveCardBtn"),
      cardsList: document.getElementById("cardsList"),
      toast: document.getElementById("toast")
    };
    const navButtons = [...document.querySelectorAll("[data-mobile-nav]")];

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        state.decks = [sampleDeck];
        state.activeDeckId = sampleDeck.id;
        applyTheme();
        saveData();
        return;
      }

      try {
        const parsed = JSON.parse(saved);
        state.decks = Array.isArray(parsed.decks) ? parsed.decks : [sampleDeck];
        state.activeDeckId = parsed.activeDeckId || state.decks[0]?.id || null;
        state.darkMode = Boolean(parsed.darkMode);
        state.shuffle = Boolean(parsed.shuffle);
        state.missedOnly = Boolean(parsed.missedOnly);
        state.reverseCards = Boolean(parsed.reverseCards);
        state.activeCardId = typeof parsed.activeCardId === "string" ? parsed.activeCardId : null;
        state.isFlipped = Boolean(parsed.isFlipped);
        state.sessionIds = Array.isArray(parsed.sessionIds) ? parsed.sessionIds.filter(id => typeof id === "string") : [];
        state.stackSessions = parsed.stackSessions && typeof parsed.stackSessions === "object" ? parsed.stackSessions : {};
      } catch {
        state.decks = [sampleDeck];
        state.activeDeckId = sampleDeck.id;
      }
      applyTheme();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        decks: state.decks,
        activeDeckId: state.activeDeckId,
        darkMode: state.darkMode,
        shuffle: state.shuffle,
        missedOnly: state.missedOnly,
        reverseCards: state.reverseCards,
        activeCardId: state.activeCardId,
        isFlipped: state.isFlipped,
        sessionIds: state.sessionIds,
        stackSessions: state.stackSessions
      }));
    }

    function applyTheme() {
      document.body.dataset.theme = state.darkMode ? "dark" : "light";
      document.querySelector('meta[name="theme-color"]').setAttribute("content", state.darkMode ? "#0e1420" : "#2764e7");
      if (els.darkModeToggle) els.darkModeToggle.checked = state.darkMode;
    }

    function getActiveDeck() {
      return state.decks.find(deck => deck.id === state.activeDeckId) || null;
    }

    function getSessionCards() {
      const deck = getActiveDeck();
      if (!deck) return [];
      return state.sessionIds
        .map(id => deck.cards.find(card => card.id === id))
        .filter(Boolean);
    }

    function currentCard() {
      const cards = getSessionCards();
      return cards.find(card => card.id === state.activeCardId) || cards[0] || null;
    }

    function getStackSession(deckId = state.activeDeckId) {
      const deck = state.decks.find(item => item.id === deckId);
      const session = deck ? state.stackSessions[deckId] : null;
      if (!session || ![10, 20, 25, 50].includes(session.size) || !Array.isArray(session.orderedIds)) return null;
      session.orderedIds = session.orderedIds.filter((id, index, ids) => typeof id === "string" && ids.indexOf(id) === index);
      session.results = session.results && typeof session.results === "object" ? session.results : {};
      session.stackIndex = Math.max(0, Math.min(Number(session.stackIndex) || 0, Math.max(0, Math.ceil(session.orderedIds.length / session.size) - 1)));
      session.active = Boolean(session.active);
      return session;
    }

    function isStackMode() {
      return Boolean(getStackSession()?.active);
    }

    function getStackIds(session = getStackSession()) {
      if (!session) return [];
      const start = session.stackIndex * session.size;
      const cardIds = new Set(getActiveDeck()?.cards.map(card => card.id) || []);
      return session.orderedIds.slice(start, start + session.size).filter(id => cardIds.has(id));
    }

    function getStackResult(session = getStackSession()) {
      if (!session) return null;
      const key = String(session.stackIndex);
      const result = session.results[key] || { answers: {}, reviewRemainingIds: [], phase: "study" };
      result.answers = result.answers && typeof result.answers === "object" ? result.answers : {};
      result.reviewRemainingIds = Array.isArray(result.reviewRemainingIds) ? result.reviewRemainingIds : [];
      result.phase = ["study", "summary", "review", "complete"].includes(result.phase) ? result.phase : "study";
      session.results[key] = result;
      return result;
    }

    function activateStackSession(keepCardId = state.activeCardId) {
      const session = getStackSession();
      const result = getStackResult(session);
      if (!session || !result) return;
      const stackIds = getStackIds(session);
      const stackIdSet = new Set(stackIds);
      result.reviewRemainingIds = result.reviewRemainingIds.filter(id => stackIdSet.has(id));
      Object.keys(result.answers).forEach(id => {
        if (!stackIdSet.has(id) || !["correct", "missed"].includes(result.answers[id])) delete result.answers[id];
      });
      if (!stackIds.length) result.phase = "summary";

      if (result.phase === "review") {
        state.sessionIds = [...result.reviewRemainingIds];
      } else if (["summary", "complete"].includes(result.phase)) {
        state.sessionIds = [];
      } else {
        state.sessionIds = stackIds;
      }
      const firstUnanswered = stackIds.find(id => !result.answers[id]);
      const preferredCardId = state.sessionIds.includes(keepCardId) ? keepCardId : session.currentCardId;
      state.activeCardId = state.sessionIds.includes(preferredCardId)
        ? preferredCardId
        : (result.phase === "study" ? firstUnanswered : null) || state.sessionIds[0] || null;
      session.currentCardId = state.activeCardId;
      state.isFlipped = false;
    }

    function startStackSession() {
      const deck = getActiveDeck();
      if (!deck || !deck.cards.length) return;
      const existingSession = getStackSession(deck.id);
      if (existingSession && !confirm("Starting a new stack session will discard the saved stack order and progress for this deck. Continue?")) return;
      const size = Number(els.stackSizeSelect.value);
      const ids = deck.cards.map(card => card.id);
      state.stackSessions[deck.id] = {
        active: true,
        size,
        shuffled: els.stackShuffleToggle.checked,
        orderedIds: els.stackShuffleToggle.checked ? shuffleArray(ids) : ids,
        stackIndex: 0,
        currentCardId: null,
        results: {}
      };
      els.stackPanel.classList.remove("open");
      activateStackSession(null);
      saveData();
      if (matchMedia("(max-width: 720px)").matches) setMobileView("study");
      render();
    }

    function openStackSetup(deckId = state.activeDeckId) {
      if (deckId && deckId !== state.activeDeckId) selectDeck(deckId);
      const session = getStackSession();
      if (session && confirm(`Resume the saved session at Stack ${session.stackIndex + 1}? Select Cancel to configure a new session.`)) {
        session.active = true;
        activateStackSession(session.currentCardId);
        saveData();
        if (matchMedia("(max-width: 720px)").matches) setMobileView("study");
        render();
        return;
      }
      els.stackPanel.classList.add("open");
      if (matchMedia("(max-width: 720px)").matches) setMobileView("stacks");
    }

    function changeStack(direction) {
      const session = getStackSession();
      if (!session) return;
      const total = Math.ceil(session.orderedIds.length / session.size);
      const nextIndex = session.stackIndex + direction;
      if (nextIndex < 0 || nextIndex >= total) return;
      if (direction > 0 && !["summary", "complete"].includes(getStackResult(session).phase)) {
        showToast("Complete the current stack before continuing.");
        return;
      }
      session.stackIndex = nextIndex;
      activateStackSession(null);
      saveData();
      render();
    }

    function restartStackSession() {
      const session = getStackSession();
      if (!session || !confirm("Restart this stack session from Stack 1?")) return;
      resetStackSession(session);
      showToast("Stack session restarted.");
    }

    function resetStackSession(session, reshuffle = false) {
      if (reshuffle) {
        session.orderedIds = shuffleArray(getActiveDeck().cards.map(card => card.id));
        session.shuffled = true;
      }
      session.stackIndex = 0;
      session.currentCardId = null;
      session.results = {};
      session.active = true;
      activateStackSession(null);
      saveData();
      render();
    }

    function studyFullDeckAgain() {
      const session = getStackSession();
      if (session) resetStackSession(session);
    }

    function reshuffleAndRestart() {
      const session = getStackSession();
      if (session) resetStackSession(session, true);
    }

    function exitStackMode() {
      const session = getStackSession();
      if (session) {
        const resumeLater = confirm("Keep this stack session so you can resume it later? Select Cancel to discard its progress.");
        if (resumeLater) {
          session.active = false;
        } else {
          if (!confirm("Discard the saved stack order and all stack progress for this deck?")) return;
          delete state.stackSessions[state.activeDeckId];
        }
      }
      state.missedOnly = false;
      rebuildSession(null, state.shuffle);
      saveData();
      render();
    }

    function finishStackSession() {
      delete state.stackSessions[state.activeDeckId];
      state.missedOnly = false;
      rebuildSession(null, state.shuffle);
      saveData();
      render();
    }

    function reviewStackMissed() {
      const session = getStackSession();
      const result = getStackResult(session);
      if (!session || !result || !result.reviewRemainingIds.length) return;
      result.phase = "review";
      activateStackSession(null);
      saveData();
      render();
    }

    function rebuildSession(keepCardId = state.activeCardId, reshuffle = false) {
      const deck = getActiveDeck();
      const source = deck ? deck.cards.filter(card => !state.missedOnly || card.status === "missed") : [];
      const ids = source.map(card => card.id);
      if (state.shuffle) {
        const existingIds = state.sessionIds.filter(id => ids.includes(id));
        const newIds = ids.filter(id => !existingIds.includes(id));
        state.sessionIds = reshuffle ? shuffleArray(ids) : [...existingIds, ...newIds];
      } else {
        state.sessionIds = ids;
      }
      state.activeCardId = state.sessionIds.includes(keepCardId) ? keepCardId : state.sessionIds[0] || null;
      state.isFlipped = false;
    }

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function textSizeClass(value) {
      const text = String(value || "").trim();
      const paragraphs = text.split(/\n\s*\n/).filter(Boolean).length;
      if (text.length > 360 || paragraphs > 2) return "text-long";
      if (text.length > 120 || paragraphs > 1) return "text-medium";
      return "text-short";
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timeout);
      showToast.timeout = window.setTimeout(() => els.toast.classList.remove("show"), 2300);
    }

    function render() {
      const deck = getActiveDeck();
      renderDecks();
      renderMobileDeckDetails(deck);
      renderHeader(deck);
      renderStats(deck);
      renderStudy(deck);
      renderCardsList(deck);
      syncControls(deck);
      syncMobileNav();
      syncSettings();
    }

    function syncSettings() {
      els.darkModeToggle.checked = state.darkMode;
    }

    function renderDecks() {
      const query = els.deckSearch.value.trim().toLowerCase();
      const decks = state.decks.filter(deck => deck.name.toLowerCase().includes(query));
      els.deckList.innerHTML = decks.length ? decks.map(deck => `
        <article class="deck-item ${deck.id === state.activeDeckId ? "active" : ""}">
          <button class="deck-main" data-deck-id="${deck.id}" type="button">
            <span class="deck-name">${escapeHtml(deck.name)}</span>
            <span class="deck-meta">${deck.cards.length} card${deck.cards.length === 1 ? "" : "s"}</span>
          </button>
          <div class="deck-actions" aria-label="Deck actions">
            <button class="deck-study-btn" data-study-deck="${deck.id}" type="button" aria-label="Study ${escapeHtml(deck.name)}">Study Deck</button>
            <button class="deck-rename-btn" data-rename-deck="${deck.id}" type="button" aria-label="Rename ${escapeHtml(deck.name)}">Rename Deck</button>
            <button class="deck-delete-btn" data-delete-deck="${deck.id}" type="button" aria-label="Delete ${escapeHtml(deck.name)}">Delete Deck</button>
          </div>
        </article>
      `).join("") : `<div class="deck-item">No decks found.</div>`;
    }

    function renderMobileDeckDetails(deck) {
      if (!deck) {
        els.mobileDeckDetails.innerHTML = `
          <h2>No deck selected</h2>
          <p>Create or select a deck to manage it.</p>
        `;
        return;
      }

      els.mobileDeckDetails.innerHTML = `
        <h2>${escapeHtml(deck.name)}</h2>
        <p>${deck.cards.length} card${deck.cards.length === 1 ? "" : "s"}</p>
        <div class="mobile-detail-actions">
          <button class="deck-study-btn" data-study-deck="${deck.id}" type="button">Study Deck</button>
          <button class="deck-rename-btn" data-study-stacks="${deck.id}" type="button">Study in Stacks</button>
          <button class="deck-rename-btn" data-rename-deck="${deck.id}" type="button">Rename Deck</button>
          <button class="deck-delete-btn" data-delete-deck="${deck.id}" type="button">Delete Deck</button>
        </div>
      `;
    }

    function renderHeader(deck) {
      els.activeDeckTitle.textContent = deck ? deck.name : "No deck selected";
      els.activeDeckSubtitle.textContent = deck
        ? "Click the card to flip it, then grade your recall."
        : "Create a deck to get started.";
    }

    function renderStats(deck) {
      const cards = deck?.cards || [];
      const known = cards.filter(card => card.status === "known").length;
      const missed = cards.filter(card => card.status === "missed").length;
      els.totalCount.textContent = cards.length;
      els.knownCount.textContent = known;
      els.missedCount.textContent = missed;
      els.remainingCount.textContent = state.sessionIds.length;
    }

    function renderStudy(deck) {
      const cards = getSessionCards();
      const card = currentCard();
      const stackSession = isStackMode() ? getStackSession() : null;
      const stackResult = stackSession ? getStackResult(stackSession) : null;
      const totalStacks = stackSession ? Math.ceil(stackSession.orderedIds.length / stackSession.size) : 0;
      const index = card ? cards.findIndex(item => item.id === card.id) : -1;
      const position = index >= 0 ? index + 1 : 0;
      const progress = stackResult && ["summary", "complete"].includes(stackResult.phase)
        ? 100
        : cards.length ? (position / cards.length) * 100 : 0;

      els.cardPosition.textContent = `${position} / ${cards.length}`;
      els.studyModeLabel.textContent = stackSession
        ? `Stack ${stackSession.stackIndex + 1} of ${totalStacks}${stackResult.phase === "review" ? " · Review missed" : ""}`
        : state.missedOnly ? "Missed cards" : "All cards";
      els.progressFill.style.width = `${progress}%`;
      els.stackControls.hidden = !stackSession;

      if (!deck) {
        els.cardStage.innerHTML = `<div class="card-empty">Create a deck to begin studying.</div>`;
        return;
      }

      if (!deck.cards.length) {
        els.cardStage.innerHTML = `<div class="card-empty">Add or import cards to start this deck.</div>`;
        return;
      }

      if (stackSession && ["summary", "complete"].includes(stackResult.phase)) {
        const answers = Object.values(stackResult.answers);
        const correct = answers.filter(answer => answer === "correct").length;
        const missed = answers.filter(answer => answer === "missed").length;
        const percentage = answers.length ? Math.round((correct / answers.length) * 100) : 0;
        const finalStack = stackSession.stackIndex >= totalStacks - 1;
        const fullDeckComplete = finalStack && Array.from({ length: totalStacks }, (_, stackIndex) => {
          const result = stackSession.results[String(stackIndex)];
          const currentCardIds = new Set(deck.cards.map(card => card.id));
          const stackLength = stackSession.orderedIds
            .slice(stackIndex * stackSession.size, (stackIndex + 1) * stackSession.size)
            .filter(id => currentCardIds.has(id)).length;
          return result && Object.keys(result.answers || {}).length === stackLength;
        }).every(Boolean);
        els.cardPosition.textContent = `${answers.length} / ${getStackIds(stackSession).length}`;
        els.cardStage.innerHTML = `
          <div class="card-empty">
            <div>
              <strong>${stackResult.phase === "complete" ? `Missed cards review complete.${fullDeckComplete ? " Full deck reviewed." : ""}` : fullDeckComplete ? "Full deck reviewed." : `Stack ${stackSession.stackIndex + 1} complete`}</strong>
              <p>Correct: ${correct}<br>Missed: ${missed}<br>Percentage correct: ${percentage}%</p>
              <div class="form-actions">
                ${stackResult.phase === "summary" && missed ? `<button class="primary-btn" id="reviewStackMissedBtn" type="button">Review Missed Cards</button>` : ""}
                ${!finalStack ? `<button class="secondary-btn" id="continueNextStackBtn" type="button">Continue to Next Stack</button>` : ""}
                ${fullDeckComplete ? `
                  <button class="secondary-btn" id="studyFullDeckAgainBtn" type="button">Study Full Deck Again</button>
                  <button class="secondary-btn" id="reshuffleRestartBtn" type="button">Reshuffle and Restart</button>
                  <button class="secondary-btn" id="finishStackSessionBtn" type="button">Exit Session</button>
                ` : ""}
              </div>
            </div>
          </div>
        `;
        return;
      }

      if (!stackSession && state.missedOnly && !cards.length) {
        els.cardStage.innerHTML = `<div class="card-empty">No missed cards yet. Mark cards as Don't Know to review them here.</div>`;
        return;
      }

      const termSizeClass = textSizeClass(card.term);
      const definitionSizeClass = textSizeClass(card.definition);
      const frontLabel = state.reverseCards ? "Definition" : "Term";
      const frontText = state.reverseCards ? card.definition : card.term;
      const frontSizeClass = state.reverseCards ? definitionSizeClass : termSizeClass;
      const backLabel = state.reverseCards ? "Term" : "Definition";
      const backText = state.reverseCards ? card.term : card.definition;
      const backSizeClass = state.reverseCards ? termSizeClass : definitionSizeClass;

      els.cardStage.innerHTML = `
        <button class="flashcard ${state.isFlipped ? "flipped" : ""}" id="flashcard" aria-label="Flip card">
          <span class="flashcard-inner">
            <span class="card-face">
              <span class="face-label">${frontLabel}</span>
              <span class="face-text ${frontSizeClass}">${escapeHtml(frontText)}</span>
            </span>
            <span class="card-face definition">
              <span class="face-label">${backLabel}</span>
              <span class="face-text ${backSizeClass}">${escapeHtml(backText)}</span>
            </span>
          </span>
        </button>
      `;
    }

    function renderCardsList(deck) {
      if (!deck) {
        els.cardsList.innerHTML = "";
        return;
      }

      els.cardsList.innerHTML = deck.cards.length ? deck.cards.map(card => `
        <article class="card-row">
          <strong>${escapeHtml(card.term)}</strong>
          <span>${escapeHtml(card.definition)}</span>
          <div class="row-actions">
            <button class="secondary-btn" data-edit-card="${card.id}" type="button">Edit</button>
            <button class="danger-btn" data-delete-card="${card.id}" type="button">Delete</button>
          </div>
        </article>
      `).join("") : `<div class="card-row"><span>No cards yet.</span></div>`;
    }

    function syncControls(deck) {
      const hasDeck = Boolean(deck);
      const hasSessionCards = state.sessionIds.length > 0;
      const hasCards = Boolean(deck?.cards.length);
      const card = currentCard();
      const cards = getSessionCards();
      const index = card ? cards.findIndex(item => item.id === card.id) : -1;
      const stackSession = isStackMode() ? getStackSession() : null;
      const totalStacks = stackSession ? Math.ceil(stackSession.orderedIds.length / stackSession.size) : 0;

      [
        els.renameDeckBtn,
        els.deleteDeckBtn,
        els.studyStacksBtn,
        els.toggleImportBtn,
        els.importBtn,
        els.clearImportBtn,
        els.termInput,
        els.definitionInput,
        els.saveCardBtn,
        els.shuffleToggle,
        els.missedToggle,
        els.reverseToggle,
        els.resetProgressBtn
      ].forEach(el => el.disabled = !hasDeck);

      els.prevBtn.disabled = !hasSessionCards || index <= 0;
      els.nextBtn.disabled = !hasSessionCards || index >= cards.length - 1;
      els.flipBtn.disabled = !hasSessionCards;
      els.knowBtn.disabled = !hasSessionCards;
      els.dontKnowBtn.disabled = !hasSessionCards;
      els.missedToggle.disabled = !hasDeck || !hasCards;
      els.studyStacksBtn.disabled = !hasDeck || !hasCards;
      els.shuffleToggle.disabled = !hasDeck || Boolean(stackSession);
      els.missedToggle.disabled = !hasDeck || !hasCards || Boolean(stackSession);
      els.shuffleToggle.checked = state.shuffle;
      els.missedToggle.checked = state.missedOnly;
      els.reverseToggle.checked = state.reverseCards;
      els.previousStackBtn.disabled = !stackSession || stackSession.stackIndex <= 0;
      els.nextStackBtn.disabled = !stackSession
        || stackSession.stackIndex >= totalStacks - 1
        || !["summary", "complete"].includes(getStackResult(stackSession).phase);
      els.dontKnowBtn.textContent = stackSession ? "Missed" : "Don't Know";
      els.knowBtn.textContent = stackSession ? "Correct" : "Know";
    }

    function selectDeck(deckId) {
      state.activeDeckId = deckId;
      state.editingCardId = null;
      resetCardForm();
      if (getStackSession()?.active) activateStackSession();
      else rebuildSession(null, state.shuffle);
      saveData();
      setMobileView("study");
      render();
      els.sidebar.classList.remove("open");
    }

    function manageDeck(deckId) {
      state.activeDeckId = deckId;
      state.editingCardId = null;
      resetCardForm();
      rebuildSession(null, state.shuffle);
      saveData();
      setMobileView("decks");
      render();
    }

    function renameDeck(deckId = state.activeDeckId) {
      const deck = state.decks.find(item => item.id === deckId);
      if (!deck) return;
      const name = prompt("Deck name", deck.name);
      if (!name?.trim()) return;
      deck.name = name.trim();
      saveData();
      render();
      showToast("Deck renamed.");
    }

    function deleteDeck(deckId = state.activeDeckId) {
      const deck = state.decks.find(item => item.id === deckId);
      if (!deck || !confirm(`Delete "${deck.name}" and all of its cards?`)) return;
      state.decks = state.decks.filter(item => item.id !== deck.id);
      delete state.stackSessions[deck.id];
      if (state.activeDeckId === deck.id) {
        state.activeDeckId = state.decks[0]?.id || null;
      }
      resetCardForm();
      rebuildSession(null, state.shuffle);
      saveData();
      render();
      showToast("Deck deleted.");
    }

    function setMobileView(view) {
      document.body.dataset.mobileView = view;
      if (view === "import") els.importPanel.classList.add("open");
      if (view === "settings") els.settingsPanel.classList.add("open");
      if (view === "add") resetCardForm();
      syncMobileNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function syncMobileNav() {
      const view = document.body.dataset.mobileView || "study";
      navButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.mobileNav === view);
      });
    }

    function moveCard(direction) {
      const cards = getSessionCards();
      const index = cards.findIndex(card => card.id === state.activeCardId);
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= cards.length) return;
      state.activeCardId = cards[nextIndex].id;
      if (isStackMode()) getStackSession().currentCardId = state.activeCardId;
      state.isFlipped = false;
      saveData();
      render();
    }

    function gradeCard(status) {
      const deck = getActiveDeck();
      const card = currentCard();
      if (!deck || !card) return;
      card.status = status;

      if (isStackMode()) {
        const session = getStackSession();
        const result = getStackResult(session);
        const answer = status === "known" ? "correct" : "missed";

        if (result.phase === "review") {
          const currentIndex = result.reviewRemainingIds.indexOf(card.id);
          if (answer === "correct") {
            result.reviewRemainingIds = result.reviewRemainingIds.filter(id => id !== card.id);
          }
          if (!result.reviewRemainingIds.length) {
            result.phase = "complete";
            state.sessionIds = [];
            state.activeCardId = null;
          } else {
            state.sessionIds = [...result.reviewRemainingIds];
            state.activeCardId = result.reviewRemainingIds[currentIndex % result.reviewRemainingIds.length];
            state.isFlipped = false;
          }
        } else {
          result.answers[card.id] = answer;
          const stackIds = getStackIds(session);
          const unansweredIds = stackIds.filter(id => !result.answers[id]);
          if (!unansweredIds.length) {
            result.reviewRemainingIds = stackIds.filter(id => result.answers[id] === "missed");
            result.phase = "summary";
            state.sessionIds = [];
            state.activeCardId = null;
          } else {
            const currentIndex = stackIds.indexOf(card.id);
            state.activeCardId = [...stackIds.slice(currentIndex + 1), ...stackIds.slice(0, currentIndex)]
              .find(id => unansweredIds.includes(id));
            state.isFlipped = false;
          }
        }

        session.currentCardId = state.activeCardId;

        saveData();
        render();
        return;
      }

      saveData();

      const cards = getSessionCards();
      const index = cards.findIndex(item => item.id === card.id);
      if (state.missedOnly && status === "known") {
        rebuildSession(cards[index + 1]?.id || cards[index - 1]?.id || null);
      } else if (cards[index + 1]) {
        state.activeCardId = cards[index + 1].id;
        state.isFlipped = false;
      }

      saveData();
      render();
    }

    function resetCardForm() {
      state.editingCardId = null;
      els.editorTitle.textContent = "Add Card";
      els.saveCardBtn.textContent = "Add Card";
      els.cardForm.reset();
    }

    function upsertCard(event) {
      event.preventDefault();
      const deck = getActiveDeck();
      if (!deck) return;

      const term = els.termInput.value.trim();
      const definition = els.definitionInput.value.trim();
      if (!term || !definition) {
        showToast("Both term and definition are required.");
        return;
      }

      if (state.editingCardId) {
        const card = deck.cards.find(item => item.id === state.editingCardId);
        card.term = term;
        card.definition = definition;
        showToast("Card updated.");
      } else {
        const card = { id: crypto.randomUUID(), term, definition, status: "unseen" };
        deck.cards.push(card);
        state.activeCardId = card.id;
        showToast(isStackMode() ? "Card added. Active stack order was preserved." : "Card added.");
      }

      resetCardForm();
      saveData();
      if (isStackMode()) activateStackSession(state.activeCardId);
      else rebuildSession(state.activeCardId);
      saveData();
      setMobileView("study");
      render();
    }

    function exportBackup() {
      const now = new Date();
      const date = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("-");
      const backup = {
        format: "SecurityFlashcardsBackup",
        version: 1,
        exportedAt: now.toISOString(),
        data: {
          decks: state.decks,
          activeDeckId: state.activeDeckId,
          activeCardId: state.activeCardId,
          darkMode: state.darkMode,
          shuffle: state.shuffle,
          missedOnly: state.missedOnly,
          reverseCards: state.reverseCards,
          isFlipped: state.isFlipped,
          sessionIds: state.sessionIds,
          stackSessions: state.stackSessions
        }
      };
      const url = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" }));
      const link = document.createElement("a");
      link.href = url;
      link.download = `SecurityFlashcards_Backup_${date}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
      showToast("Backup exported.");
    }

    function validateBackup(backup) {
      if (!backup || backup.format !== "SecurityFlashcardsBackup" || backup.version !== 1) return null;
      const data = backup.data;
      if (!data || !Array.isArray(data.decks) || !Array.isArray(data.sessionIds)) return null;
      if (![data.activeDeckId, data.activeCardId].every(id => id === null || typeof id === "string")) return null;
      if (![data.darkMode, data.shuffle, data.missedOnly, data.reverseCards, data.isFlipped].every(value => typeof value === "boolean")) return null;
      if (!data.sessionIds.every(id => typeof id === "string") || new Set(data.sessionIds).size !== data.sessionIds.length) return null;

      const deckIds = new Set();
      for (const deck of data.decks) {
        if (!deck || typeof deck.id !== "string" || typeof deck.name !== "string" || !deck.name.trim() || !Array.isArray(deck.cards) || deckIds.has(deck.id)) return null;
        deckIds.add(deck.id);
        const cardIds = new Set();
        for (const card of deck.cards) {
          if (!card || typeof card.id !== "string" || typeof card.term !== "string" || typeof card.definition !== "string" || !["unseen", "known", "missed"].includes(card.status) || cardIds.has(card.id)) return null;
          cardIds.add(card.id);
        }
      }

      if (data.activeDeckId !== null && !deckIds.has(data.activeDeckId)) return null;
      const activeDeck = data.decks.find(deck => deck.id === data.activeDeckId) || null;
      const activeCardIds = new Set(activeDeck?.cards.map(card => card.id) || []);
      if (data.activeCardId !== null && !activeCardIds.has(data.activeCardId)) return null;
      if (!data.sessionIds.every(id => activeCardIds.has(id))) return null;
      const stackSessions = data.stackSessions ?? {};
      if (!stackSessions || typeof stackSessions !== "object" || Array.isArray(stackSessions)) return null;
      for (const [deckId, session] of Object.entries(stackSessions)) {
        const deck = data.decks.find(item => item.id === deckId);
        if (!deck || !session || ![10, 20, 25, 50].includes(session.size) || typeof session.active !== "boolean" || typeof session.shuffled !== "boolean" || !Array.isArray(session.orderedIds) || !session.results || typeof session.results !== "object") return null;
        const cardIds = new Set(deck.cards.map(card => card.id));
        if (!session.orderedIds.every(id => typeof id === "string") || new Set(session.orderedIds).size !== session.orderedIds.length || !Number.isInteger(session.stackIndex) || session.stackIndex < 0) return null;
        if (session.currentCardId != null && !cardIds.has(session.currentCardId)) return null;
        for (const result of Object.values(session.results)) {
          if (!result || !result.answers || typeof result.answers !== "object" || !Array.isArray(result.reviewRemainingIds) || !["study", "summary", "review", "complete"].includes(result.phase)) return null;
          if (!Object.values(result.answers).every(answer => ["correct", "missed"].includes(answer)) || !result.reviewRemainingIds.every(id => cardIds.has(id))) return null;
        }
      }
      data.stackSessions = stackSessions;
      return data;
    }

    async function importBackup(file) {
      try {
        const backup = JSON.parse(await file.text());
        const data = validateBackup(backup);
        if (!data) throw new Error("Invalid backup");
        if (!confirm("Import this backup and replace all existing decks, progress, and settings?")) return;

        state.decks = data.decks;
        state.activeDeckId = data.activeDeckId;
        state.activeCardId = data.activeCardId;
        state.darkMode = data.darkMode;
        state.shuffle = data.shuffle;
        state.missedOnly = data.missedOnly;
        state.reverseCards = data.reverseCards;
        state.isFlipped = data.isFlipped;
        state.sessionIds = data.sessionIds;
        state.stackSessions = data.stackSessions;
        state.editingCardId = null;
        resetCardForm();
        applyTheme();
        saveData();
        render();
        showToast("Backup imported.");
      } catch {
        showToast("Invalid backup file. No data was changed.");
      } finally {
        els.backupFileInput.value = "";
      }
    }

    function importCards() {
      const deck = getActiveDeck();
      if (!deck) return;

      const parsed = [];
      let currentCard = null;

      function finishImportedCard() {
        if (!currentCard) return;
        const definition = currentCard.definitionLines.join("\n");
        if (currentCard.term && definition.trim()) {
          parsed.push({
            id: crypto.randomUUID(),
            term: currentCard.term,
            definition,
            status: "unseen"
          });
        }
      }

      els.importText.value.split(/\r?\n/).forEach(line => {
        const tabIndex = line.indexOf("\t");
        if (tabIndex !== -1) {
          finishImportedCard();
          currentCard = {
            term: line.slice(0, tabIndex).trim(),
            definitionLines: [line.slice(tabIndex + 1)]
          };
        } else if (currentCard) {
          currentCard.definitionLines.push(line);
        }
      });
      finishImportedCard();

      if (!parsed.length) {
        showToast("No valid tab-separated cards found.");
        return;
      }

      deck.cards.push(...parsed);
      state.activeCardId = parsed[0].id;
      els.importText.value = "";
      saveData();
      if (isStackMode()) activateStackSession(state.activeCardId);
      else rebuildSession(state.activeCardId);
      saveData();
      setMobileView("study");
      render();
      showToast(`Imported ${parsed.length} card${parsed.length === 1 ? "" : "s"}.${isStackMode() ? " Active stack order was preserved." : ""}`);
    }

    els.deckForm.addEventListener("submit", event => {
      event.preventDefault();
      const name = els.deckNameInput.value.trim();
      if (!name) return;
      const deck = { id: crypto.randomUUID(), name, cards: [] };
      state.decks.push(deck);
      els.deckNameInput.value = "";
      selectDeck(deck.id);
      showToast("Deck created.");
    });

    els.deckList.addEventListener("click", event => {
      const studyButton = event.target.closest("[data-study-deck]");
      const renameButton = event.target.closest("[data-rename-deck]");
      const deleteButton = event.target.closest("[data-delete-deck]");
      if (studyButton) return selectDeck(studyButton.dataset.studyDeck);
      if (renameButton) return renameDeck(renameButton.dataset.renameDeck);
      if (deleteButton) return deleteDeck(deleteButton.dataset.deleteDeck);

      const deckItem = event.target.closest("[data-deck-id]");
      if (deckItem) {
        if (matchMedia("(max-width: 720px)").matches) {
          manageDeck(deckItem.dataset.deckId);
        } else {
          selectDeck(deckItem.dataset.deckId);
        }
      }
    });

    els.mobileDeckDetails.addEventListener("click", event => {
      const studyButton = event.target.closest("[data-study-deck]");
      const stacksButton = event.target.closest("[data-study-stacks]");
      const renameButton = event.target.closest("[data-rename-deck]");
      const deleteButton = event.target.closest("[data-delete-deck]");
      if (studyButton) return selectDeck(studyButton.dataset.studyDeck);
      if (stacksButton) return openStackSetup(stacksButton.dataset.studyStacks);
      if (renameButton) return renameDeck(renameButton.dataset.renameDeck);
      if (deleteButton) return deleteDeck(deleteButton.dataset.deleteDeck);
    });

    els.deckSearch.addEventListener("input", renderDecks);
    els.openDecksBtn.addEventListener("click", () => els.sidebar.classList.add("open"));
    els.closeDecksBtn.addEventListener("click", () => els.sidebar.classList.remove("open"));
    els.exportBackupBtn.addEventListener("click", exportBackup);
    els.importBackupBtn.addEventListener("click", () => els.backupFileInput.click());
    els.backupFileInput.addEventListener("change", () => {
      const file = els.backupFileInput.files[0];
      if (file) importBackup(file);
    });

    els.renameDeckBtn.addEventListener("click", () => {
      renameDeck();
    });

    els.studyStacksBtn.addEventListener("click", () => openStackSetup());
    els.startStacksBtn.addEventListener("click", startStackSession);
    els.cancelStacksBtn.addEventListener("click", () => {
      els.stackPanel.classList.remove("open");
      if (matchMedia("(max-width: 720px)").matches) setMobileView("study");
    });
    els.previousStackBtn.addEventListener("click", () => changeStack(-1));
    els.nextStackBtn.addEventListener("click", () => changeStack(1));
    els.restartStacksBtn.addEventListener("click", restartStackSession);
    els.exitStacksBtn.addEventListener("click", exitStackMode);

    els.deleteDeckBtn.addEventListener("click", () => {
      deleteDeck();
    });

    els.toggleImportBtn.addEventListener("click", () => {
      els.importPanel.classList.toggle("open");
      if (matchMedia("(max-width: 720px)").matches) setMobileView("import");
    });

    els.settingsBtn.addEventListener("click", () => {
      els.settingsPanel.classList.toggle("open");
      if (matchMedia("(max-width: 720px)").matches) setMobileView("settings");
    });

    els.darkModeToggle.addEventListener("change", () => {
      state.darkMode = els.darkModeToggle.checked;
      applyTheme();
      saveData();
      showToast(state.darkMode ? "Dark mode on." : "Dark mode off.");
    });

    els.importBtn.addEventListener("click", importCards);
    els.clearImportBtn.addEventListener("click", () => {
      els.importText.value = "";
    });

    els.shuffleToggle.addEventListener("change", () => {
      state.shuffle = els.shuffleToggle.checked;
      rebuildSession(null, state.shuffle);
      saveData();
      render();
    });

    els.missedToggle.addEventListener("change", () => {
      state.missedOnly = els.missedToggle.checked;
      rebuildSession(null, state.shuffle);
      saveData();
      render();
    });

    els.reverseToggle.addEventListener("change", () => {
      state.reverseCards = els.reverseToggle.checked;
      state.isFlipped = false;
      saveData();
      render();
    });

    els.resetProgressBtn.addEventListener("click", () => {
      const deck = getActiveDeck();
      if (!deck) return;
      deck.cards.forEach(card => card.status = "unseen");
      delete state.stackSessions[deck.id];
      state.missedOnly = false;
      saveData();
      rebuildSession(null, state.shuffle);
      saveData();
      render();
      showToast("Progress reset.");
    });

    els.cardStage.addEventListener("click", event => {
      if (event.target.closest("#reviewStackMissedBtn")) return reviewStackMissed();
      if (event.target.closest("#continueNextStackBtn")) return changeStack(1);
      if (event.target.closest("#studyFullDeckAgainBtn")) return studyFullDeckAgain();
      if (event.target.closest("#reshuffleRestartBtn")) return reshuffleAndRestart();
      if (event.target.closest("#finishStackSessionBtn")) return finishStackSession();
      if (!event.target.closest("#flashcard")) return;
      state.isFlipped = !state.isFlipped;
      saveData();
      render();
    });

    els.flipBtn.addEventListener("click", () => {
      state.isFlipped = !state.isFlipped;
      saveData();
      render();
    });

    els.prevBtn.addEventListener("click", () => moveCard(-1));
    els.nextBtn.addEventListener("click", () => moveCard(1));
    els.knowBtn.addEventListener("click", () => gradeCard("known"));
    els.dontKnowBtn.addEventListener("click", () => gradeCard("missed"));

    els.cardForm.addEventListener("submit", upsertCard);
    els.cancelEditBtn.addEventListener("click", resetCardForm);

    els.cardsList.addEventListener("click", event => {
      const editButton = event.target.closest("[data-edit-card]");
      const deleteButton = event.target.closest("[data-delete-card]");
      const deck = getActiveDeck();
      if (!deck) return;

      if (editButton) {
        const card = deck.cards.find(item => item.id === editButton.dataset.editCard);
        if (!card) return;
        state.editingCardId = card.id;
        els.editorTitle.textContent = "Edit Card";
        els.saveCardBtn.textContent = "Save Card";
        els.termInput.value = card.term;
        els.definitionInput.value = card.definition;
      }

      if (deleteButton) {
        const card = deck.cards.find(item => item.id === deleteButton.dataset.deleteCard);
        const message = isStackMode()
          ? "Delete this flashcard? It will be removed from the active stack snapshot without reshuffling the remaining cards."
          : "Delete this flashcard?";
        if (!card || !confirm(message)) return;
        deck.cards = deck.cards.filter(item => item.id !== card.id);
        if (state.editingCardId === card.id) resetCardForm();
        saveData();
        if (isStackMode()) activateStackSession(state.activeCardId === card.id ? null : state.activeCardId);
        else rebuildSession(state.activeCardId === card.id ? null : state.activeCardId);
        saveData();
        render();
        showToast("Card deleted.");
      }
    });

    navButtons.forEach(button => {
      button.addEventListener("click", () => setMobileView(button.dataset.mobileNav));
    });

    document.addEventListener("keydown", event => {
      if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
      if (event.key === " ") {
        event.preventDefault();
        if (!els.flipBtn.disabled) els.flipBtn.click();
      }
      if (event.key === "ArrowLeft") els.prevBtn.click();
      if (event.key === "ArrowRight") els.nextBtn.click();
    });

    loadData();
    const savedFlipState = state.isFlipped;
    if (getStackSession()?.active) activateStackSession(state.activeCardId);
    else rebuildSession(state.activeCardId);
    state.isFlipped = savedFlipState;
    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
