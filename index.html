<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2764e7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Flashcards">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Security Flashcards</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --text: #161b24;
      --muted: #64748b;
      --line: #dbe2ea;
      --primary: #2764e7;
      --primary-strong: #1746ad;
      --danger: #d03939;
      --success: #168456;
      --warning: #b86b00;
      --shadow: 0 18px 45px rgba(25, 35, 55, 0.1);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0e1420;
      --surface: #161f2e;
      --surface-2: #202b3d;
      --text: #f5f7fb;
      --muted: #9aa8bd;
      --line: #2c3a50;
      --primary: #7aa2ff;
      --primary-strong: #a8c1ff;
      --danger: #ff8d8d;
      --success: #74d6a5;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      background: #111827;
      color: #f8fafc;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    .deck-form,
    .search-box {
      display: flex;
      gap: 8px;
    }

    .sidebar input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: var(--radius);
      padding: 11px 12px;
      outline: none;
    }

    .sidebar input::placeholder {
      color: rgba(248, 250, 252, 0.58);
    }

    .icon-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .success-btn,
    .ghost-btn,
    .text-btn {
      min-height: 42px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 700;
      transition: transform 0.16s ease, background 0.16s ease, border 0.16s ease;
    }

    .icon-btn {
      width: 42px;
      padding: 0;
      flex: 0 0 auto;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .icon-btn:hover,
    .primary-btn:hover,
    .secondary-btn:hover,
    .danger-btn:hover,
    .success-btn:hover,
    .ghost-btn:hover,
    .text-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .primary-btn:hover {
      background: var(--primary-strong);
    }

    .secondary-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger-btn {
      background: #fff0f0;
      color: var(--danger);
      border: 1px solid #fac5c5;
    }

    .success-btn {
      background: #eaf8f1;
      color: var(--success);
      border: 1px solid #bce8d3;
    }

    body[data-theme="dark"] .danger-btn {
      background: rgba(255, 141, 141, 0.12);
      border-color: rgba(255, 141, 141, 0.35);
    }

    body[data-theme="dark"] .success-btn {
      background: rgba(116, 214, 165, 0.12);
      border-color: rgba(116, 214, 165, 0.35);
    }

    .ghost-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .text-btn {
      min-height: 34px;
      padding: 0 10px;
      color: var(--primary);
      background: transparent;
    }

    .deck-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 2px;
    }

    .deck-item {
      width: 100%;
      text-align: left;
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 13px;
      cursor: pointer;
    }

    .deck-main {
      width: 100%;
      display: block;
      padding: 0;
      background: transparent;
      color: inherit;
      text-align: left;
    }

    .deck-item.active {
      background: #fff;
      color: #111827;
      border-color: #fff;
    }

    .deck-main:focus-visible,
    .deck-item:focus-visible {
      outline: 3px solid rgba(39, 100, 231, 0.35);
      outline-offset: 2px;
    }

    .deck-name {
      display: block;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .deck-meta {
      display: block;
      color: inherit;
      opacity: 0.64;
      font-size: 0.86rem;
      margin-top: 4px;
    }

    .deck-actions {
      display: none;
    }

    .backup-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    #stackControls[hidden] {
      display: none;
    }

    .mobile-deck-details {
      display: none;
    }

    .main {
      min-width: 0;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .title-block h2 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.25rem);
      overflow-wrap: anywhere;
    }

    .title-block p {
      margin: 7px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.04);
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.87rem;
    }

    .study-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .study-panel,
    .editor-panel,
    .import-panel,
    .stack-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .study-panel {
      padding: 18px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .toggle-row,
    .nav-row,
    .grade-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-weight: 700;
      user-select: none;
    }

    .switch input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .card-stage {
      perspective: 1200px;
      min-height: 330px;
      margin: 12px 0 16px;
    }

    .flashcard {
      width: 100%;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      padding: 0;
      display: block;
      position: relative;
    }

    .flashcard-inner {
      min-height: 330px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.42s ease;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      padding: clamp(22px, 4vw, 42px);
      border-radius: var(--radius);
      backface-visibility: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: auto;
    }

    .card-face.definition {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #fff 0%, #f4fbf7 100%);
    }

    .face-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .face-text {
      max-width: 780px;
      font-size: clamp(1.35rem, 4vw, 2.35rem);
      line-height: 1.25;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .card-empty {
      min-height: 330px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .progress-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width 0.2s ease;
    }

    .editor-panel,
    .import-panel,
    .stack-panel {
      padding: 18px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .field-grid {
      display: grid;
      gap: 10px;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
      color: var(--text);
      outline: none;
      background: #fff;
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus,
    .sidebar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(39, 100, 231, 0.15);
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .cards-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      max-height: 460px;
      overflow: auto;
      padding-right: 2px;
    }

    .card-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 9px;
      background: #fff;
    }

    .card-row strong,
    .card-row span {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .card-row span {
      color: var(--muted);
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .import-panel {
      display: none;
    }

    .import-panel.open {
      display: block;
    }

    .settings-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .settings-panel.open {
      display: block;
    }

    .stack-panel {
      display: none;
    }

    .stack-panel.open {
      display: block;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--surface);
    }

    .setting-row strong {
      display: block;
      margin-bottom: 3px;
    }

    .setting-row span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: 56px;
      height: 32px;
      flex: 0 0 auto;
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      inset: 0;
    }

    .toggle-track {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      transition: background 0.18s ease, border 0.18s ease;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 4px;
      left: 4px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(17, 24, 39, 0.18);
      transition: transform 0.18s ease;
    }

    .toggle input:checked + .toggle-track {
      background: var(--primary);
      border-color: var(--primary);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(24px);
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 3px solid rgba(39, 100, 231, 0.25);
      outline-offset: 3px;
    }

    body[data-theme="dark"] .card-row,
    body[data-theme="dark"] .field input,
    body[data-theme="dark"] .field textarea,
    body[data-theme="dark"] .field select {
      background: var(--surface);
    }

    body[data-theme="dark"] .card-face {
      background: linear-gradient(135deg, #182233 0%, #111827 100%);
    }

    body[data-theme="dark"] .card-face.definition {
      background: linear-gradient(135deg, #162238 0%, #10251d 100%);
    }

    body[data-theme="dark"] .sidebar {
      background: #0b111c;
    }

    body[data-theme="dark"] .deck-item.active {
      background: rgba(122, 162, 255, 0.16);
      border-color: rgba(122, 162, 255, 0.55);
      color: var(--text);
    }

    body[data-theme="dark"] .deck-rename-btn {
      background: var(--surface-2);
    }

    body[data-theme="dark"] .deck-delete-btn {
      background: rgba(255, 141, 141, 0.12);
      border-color: rgba(255, 141, 141, 0.35);
    }

    body[data-theme="dark"] .deck-study-btn {
      color: #0b111c;
    }

    body[data-theme="dark"] .toast {
      background: #f5f7fb;
      color: #111827;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      background: #111827;
      color: #fff;
      border-radius: var(--radius);
      padding: 13px 15px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-deck-toggle {
      display: none;
    }

    .bottom-nav {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .sidebar.open {
        display: flex;
      }

      .mobile-deck-toggle {
        display: inline-flex;
      }

      .main {
        padding: 18px;
      }

      .study-layout {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .topbar,
      .toolbar,
      .panel-header {
        align-items: stretch;
        flex-direction: column;
      }

      .topbar {
        gap: 6px;
      }

      .actions,
      .toolbar .toggle-row,
      .nav-row,
      .grade-row,
      .form-actions {
        width: 100%;
      }

      .actions > *,
      .nav-row > *,
      .grade-row > *,
      .form-actions > * {
        flex: 1 1 auto;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .card-stage,
      .flashcard,
      .flashcard-inner,
      .card-empty {
        min-height: 285px;
      }

      .face-text {
        font-size: clamp(1.2rem, 7vw, 1.8rem);
      }
    }

    @media (max-width: 720px) {
      body {
        background: var(--bg);
      }

      .app {
        display: block;
        min-height: 100dvh;
        padding-bottom: calc(96px + env(safe-area-inset-bottom));
      }

      .sidebar {
        display: none;
        min-height: calc(100dvh - 76px - env(safe-area-inset-bottom));
        background: var(--bg);
        color: var(--text);
        padding: calc(14px + env(safe-area-inset-top)) 18px 18px;
      }

      body[data-mobile-view="decks"] .sidebar {
        display: flex;
      }

      body[data-mobile-view="decks"] .main {
        display: none;
      }

      .brand h1 {
        font-size: 1.6rem;
      }

      .sidebar input {
        min-height: 52px;
        border-color: var(--line);
        background: var(--surface);
        color: var(--text);
        font-size: 1rem;
      }

      .sidebar input::placeholder {
        color: var(--muted);
      }

      .deck-item {
        min-height: 74px;
        background: var(--surface);
        color: var(--text);
        border-color: var(--line);
        box-shadow: 0 8px 22px rgba(17, 24, 39, 0.05);
      }

      .deck-item.active {
        background: #eef4ff;
        border-color: #9bb9ff;
        color: var(--text);
      }

      .deck-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .deck-actions button {
        min-height: 46px;
        border-radius: var(--radius);
        font-weight: 800;
        font-size: 0.86rem;
        padding: 0 8px;
      }

      .deck-study-btn {
        background: var(--primary);
        color: #fff;
      }

      .deck-rename-btn {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--line);
      }

      .deck-delete-btn {
        background: #fff0f0;
        color: var(--danger);
        border: 1px solid #fac5c5;
      }

      .mobile-deck-details {
        display: block;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      }

      .mobile-deck-details h2 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      .mobile-deck-details p {
        margin: 7px 0 14px;
        color: var(--muted);
        font-weight: 700;
      }

      .mobile-detail-actions {
        display: grid;
        gap: 10px;
      }

      .mobile-detail-actions button {
        width: 100%;
        min-height: 52px;
        border-radius: var(--radius);
        font-weight: 800;
        font-size: 1rem;
      }

      .icon-btn {
        width: 52px;
        min-height: 52px;
        background: var(--primary);
      }

      .main {
        min-height: calc(100dvh - 76px - env(safe-area-inset-bottom));
        padding: calc(10px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));
        gap: 10px;
      }

      .topbar,
      .toolbar,
      .panel-header {
        align-items: stretch;
        flex-direction: column;
      }

      .mobile-deck-toggle,
      .actions {
        display: none;
      }

      .title-block h2 {
        font-size: 1.28rem;
        line-height: 1.15;
      }

      .title-block p {
        font-size: 0.86rem;
        margin-top: 4px;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        padding: 8px 9px;
        box-shadow: none;
      }

      .stat:nth-child(4) {
        display: none;
      }

      .stat strong {
        font-size: 1rem;
        line-height: 1.1;
      }

      .stat span {
        font-size: 0.72rem;
      }

      .study-layout {
        display: block;
      }

      .study-panel,
      .editor-panel,
      .import-panel,
      .stack-panel {
        border: 0;
        box-shadow: none;
        background: transparent;
        padding: 0;
      }

      .study-panel {
        display: flex;
        flex-direction: column;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      body[data-mobile-view="study"] .editor-panel,
      body[data-mobile-view="study"] .import-panel,

        border: 0;

        display: block;

        min-height: inherit;

      .card-face {
        border-radius: 18px;
        padding: 22px 24px;
        justify-content: center;
        align-items: center;
        height: 100%;
        min-height: inherit;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      .face-label {
        font-size: 0.76rem;
        margin-bottom: 12px;
      }

      .face-text {
        display: block;
        width: 100%;
        max-width: none;
        font-size: clamp(28px, 8vw, 40px);
        line-height: 1.18;
        font-weight: 750;
        text-align: center;
        overflow-wrap: break-word;
        word-break: normal;
        hyphens: auto;
        transform: none;
      }

      .face-text.text-short {
        font-size: clamp(32px, 9vw, 42px);
        line-height: 1.14;
      }

      .face-text.text-medium {
        font-size: clamp(24px, 6.7vw, 32px);
        line-height: 1.2;

      }

      .face-text.text-long {
        font-size: clamp(18px, 4.8vw, 24px);

      }

      .nav-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }

      .grade-row {

      .field textarea,
      .field input,
      .field select {
        min-height: 52px;

      }

      .field textarea {
        min-height: 128px;

      .cards-list {
        max-height: none;
        padding-bottom: 8px;

      .card-row {

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
        padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, 0.94);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(18px);
      }

      .bottom-nav button {
        min-height: 54px;
        border-radius: 14px;
        background: transparent;
        color: var(--muted);
        font-weight: 800;

      }

      }

    @media (max-width: 720px) and (min-height: 880px) {
